<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SML - Sheet Music Library</title>
  <meta name="description" content="SML — 你的私人乐谱库。简洁高效的乐谱与练习录音管理应用，为音乐学习者打造。" />
  <meta property="og:title" content="SML - Sheet Music Library" />
  <meta property="og:description" content="简洁高效的乐谱与练习录音管理应用，支持乐谱上传、练习录音、AI 音乐助手" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sml-sheet-music-library.vercel.app/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SML - Sheet Music Library" />
  <meta name="twitter:description" content="你的私人乐谱库 · Your Personal Sheet Music Library" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="theme-color" content="#060b14" />

  <!-- Fonts — 衬线 + 无衬线双字体系统 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Noto+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- GSAP + ScrollTrigger — 滚动驱动动画核心 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            oldGold: '#C5A059',
            goldLight: '#e8c878',
            goldDim: 'rgba(197, 160, 89, 0.15)',
            bgDeep: '#060b14',
            bgSection: '#0a1220',
            textPrimary: '#f0ece4',
            textSecondary: 'rgba(240, 236, 228, 0.55)',
            textAccent: '#C5A059',
            divider: 'rgba(197, 160, 89, 0.1)',
          },
          fontFamily: {
            serif: ['Newsreader', 'Georgia', 'serif'],
            sans: ['Noto Sans', 'sans-serif'],
          },
          animation: {
            'scroll-pulse': 'scrollPulse 2s ease-in-out infinite',
            'glow': 'glow 3s ease-in-out infinite alternate',
          },
          keyframes: {
            scrollPulse: {
              '0%, 100%': { opacity: '0.3', transform: 'scaleY(0.6)' },
              '50%': { opacity: '1', transform: 'scaleY(1)' },
            },
            glow: {
              '0%': { opacity: '0.4' },
              '100%': { opacity: '0.8' },
            },
          },
        },
      },
    }
  </script>
  <style>
    /* NOTE: 深色沉浸式全局样式 */
    html {
      scroll-behavior: auto;
      overflow-x: hidden;
      background: #060b14;
    }

    body {
      background: #060b14;
      color: #f0ece4;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* 自定义光标 — 仅桌面端 */
    @media (min-width: 769px) {
      body {
        cursor: none;
      }
    }

    /* 自定义滚动条 — GTA6 风格窄金色 */
    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-track {
      background: #060b14;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #1a3a5c, #C5A059);
      border-radius: 2px;
    }

    /* 选中文字 */
    ::selection {
      background: rgba(197, 160, 89, 0.3);
      color: #f0ece4;
    }

    /* 隐藏滚动条（辅助 class） */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
